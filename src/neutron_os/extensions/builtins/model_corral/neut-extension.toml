[extension]
name = "model-corral"
version = "0.1.0"
description = "Physics model registry — versioning, validation, and provenance"
builtin = true
kind = "tool"
module = "platform"

[[cli.commands]]
noun = "model"
module = "neutron_os.extensions.builtins.model_corral.cli"
description = "Manage physics simulation models"

# Agent-driven sync — EVE watches for model changes and auto-pushes to Git
[agent]
heartbeat_interval = 60
startup = "lazy"     # activates when MODEL_CORRAL_REMOTE is set

[[agent.watchers]]
name = "model_sync"
enabled = true
interval = 60        # check for unsync'd models every 60s
module = "neutron_os.extensions.builtins.model_corral.sync"
function = "run_watcher_cycle"
