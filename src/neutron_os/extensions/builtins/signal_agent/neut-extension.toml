[extension]
name = "signal"
version = "0.4.0"
description = "Agentic signal ingestion pipeline"
author = "NeutronOS"
builtin = true
kind = "agent"
module = "platform"

[[cli.commands]]
noun = "signal"
module = "neutron_os.extensions.builtins.signal_agent.cli"
description = "Agentic signal ingestion pipeline"

# Agent lifecycle configuration
[agent]
heartbeat_interval = 30      # seconds between polling cycles
startup = "lazy"             # "lazy" (on first use) | "eager" (on neut start) | "daemon" (background service)

# Watched sources — each source is polled on the heartbeat interval
[[agent.watchers]]
name = "onedrive"
enabled = true
interval = 30                # seconds (< 1 min SLA)
folder = "NeutronOS"

[[agent.watchers]]
name = "inbox"
enabled = true
interval = 10                # seconds
path = "runtime/inbox/raw"

[[connections]]
name = "onedrive"
display_name = "Microsoft OneDrive"
kind = "storage"
category = "documents"
