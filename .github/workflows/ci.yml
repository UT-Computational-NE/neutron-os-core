name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,publisher]"
      - name: Run tests
        run: pytest tests/ src/neutron_os/ -v --tb=short --ignore=tests/promptfoo --ignore-glob='**/test_standard.py'

  build:
    runs-on: ubuntu-latest
    # On tag-pushes, build runs independently of the test gate so a release
    # can ship even if a non-blocking test surfaces an issue. On regular
    # branch/PR pushes, build still gates on test passing.
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
