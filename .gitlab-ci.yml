# Neutron OS — GitLab CI/CD Pipeline
#
# NeutronOS is a thin nuclear-domain extension layer on top of Axiom.
# Heavy lifting (signal pipeline, RAG, agents, migrations) is tested in Axiom's CI.
#
# Pipeline tiers by trigger:
#   Push to any branch  → preflight + unit tests + lint (if code changed)
#   MR opened/updated   → preflight + unit + lint + build wheel
#   Merge to main       → all tests + build + publish + mirror
#   Tag v* pushed       → all tests + build + publish stable release
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   GITLAB_TOKEN                — Personal access token for rsicc-gitlab.tacc.utexas.edu
#   GITHUB_TOKEN_AXIOM_OS       — GitHub fine-grained PAT, read-only on b-tree-labs/axiom-os
#                                  (clones axiom-tests sibling-package for AEOS conformance suite)
#   GITHUB_TOKEN_NEUTRON_MIRROR — GitHub fine-grained PAT, read+write on
#                                  UT-Computational-NE/neutron-os-core (mirror:github push target)
#   ANTHROPIC_API_KEY           — Powers LLM sensitivity review gate (mirror:review job)
#
# Runner setup:
#   If no shared runners are available on TACC GitLab, register your own:
#   gitlab-runner register --url https://rsicc-gitlab.tacc.utexas.edu \
#     --token <runner-token> --executor shell

stages:
  - preflight
  - test
  - build
  - publish
  - ai
  - mirror
  - notify

# =============================================================================
# Variables
# =============================================================================

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_VERSION: "3.12"
  VENV_DIR: "$CI_PROJECT_DIR/.venv"

# =============================================================================
# Change-set anchors
# =============================================================================

.changes-code: &changes-code
  - src/**/*
  - tests/**/*
  - pyproject.toml
  - conftest.py
  - .gitlab-ci.yml

.changes-mirror: &changes-mirror
  - src/**/*
  - scripts/**/*
  - docs/**/*
  - tests/**/*
  - "*.md"
  - "*.toml"
  - .gitignore
  - .envrc
  - .gitlab-ci.yml

# =============================================================================
# Templates
# =============================================================================

# Full setup — used only by preflight:dependencies to build the venv once.
# Recreates venv from scratch every time to avoid stale symlink issues
# when the runner's Python version changes.
.python-full-setup:
  image: python:${PYTHON_VERSION}-slim
  cache:
    key:
      prefix: "pip-py${PYTHON_VERSION}"
      files: [pyproject.toml]
    paths:
      - .pip-cache/
    fallback_keys:
      - "pip-py${PYTHON_VERSION}-default"
  before_script:
    # Always recreate venv — stale symlinks are the #1 CI failure cause
    - rm -rf "$VENV_DIR"
    - python3 -m venv --without-pip "$VENV_DIR" || python3 -m venv "$VENV_DIR"
    - export PATH="$VENV_DIR/bin:$PATH"
    - curl -sS https://bootstrap.pypa.io/get-pip.py | python3
    - pip install --quiet --upgrade pip
    - pip install --quiet -e ".[all]"
    # axiom-tests provides ExtensionStandardTests (AEOS conformance). Sibling
    # package in the axiom repo, not on PyPI yet. Embed the b-tree-labs-scoped
    # token directly in the clone URL — cleaner than a global git insteadOf
    # rewrite when there are multiple GitHub tokens with different per-org
    # scopes. Best-effort: if the token is missing/unscoped, skip the install
    # and let test:unit deselect the standard tests (see `--ignore-glob`).
    # Track: publish axiom-tests to PyPI so this becomes a normal dep.
    - |
      if [ -n "${GITHUB_TOKEN_AXIOM_OS:-}" ]; then
        pip install --quiet "axiom-tests @ git+https://x-access-token:${GITHUB_TOKEN_AXIOM_OS}@github.com/b-tree-labs/axiom-os.git#subdirectory=packages/axiom-tests" \
          || echo "WARN axiom-tests install failed; AEOS standard tests will be skipped"
      else
        echo "WARN GITHUB_TOKEN_AXIOM_OS not set; axiom-tests skipped"
      fi

# Lightweight setup — reuses the venv artifact from preflight:dependencies.
# Jobs extending this MUST declare `needs: [preflight:dependencies]`.
# Validates venv is usable before proceeding.
.python-setup:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - export PATH="$VENV_DIR/bin:$PATH"
    # Fail fast if venv is broken (stale symlinks, missing Python)
    - python3 -c 'import sys; print(f"venv OK — Python {sys.version}")' || (echo "ERROR venv broken — preflight:dependencies may have been skipped" && exit 1)

# =============================================================================
# Preflight Stage
# =============================================================================

preflight:connections:
  stage: preflight
  image: python:3.12-slim
  variables:
    GITHUB_TOKEN_AXIOM_OS: $GITHUB_TOKEN_AXIOM_OS
    GITHUB_TOKEN_NEUTRON_MIRROR: $GITHUB_TOKEN_NEUTRON_MIRROR
  before_script:
    - pip install --quiet --break-system-packages requests
  script:
    - |
      python3 << 'EOF'
      import os, requests

      # Preflight only checks credentials this pipeline ACTIVELY consumes
      # in non-cosmetic jobs:
      #   - GITHUB_TOKEN_AXIOM_OS       → axiom-tests clone (preflight:dependencies)
      #   - GITHUB_TOKEN_NEUTRON_MIRROR → mirror:github push
      # GITLAB_TOKEN is consumed only by notify:failure-issue (cosmetic, runs
      # on cascade-failure). It's deliberately NOT checked here — that job
      # can yell about its own credential when/if it actually runs.
      # Any auth GitLab itself needs in CI is via CI_JOB_TOKEN (built-in).

      PASS = "\033[32m✓\033[0m"
      WARN = "\033[33m!\033[0m"

      # Both GitHub tokens are warn-not-fail because the consuming jobs
      # already degrade gracefully on missing/unscoped tokens.
      def check_gh(varname, repo, purpose):
          tok = os.environ.get(varname, "")
          if not tok:
              print(f"{WARN} {varname} not set ({purpose} will be skipped/fail)")
              return
          r = requests.get(
              f"https://api.github.com/repos/{repo}",
              headers={"Authorization": f"Bearer {tok}", "Accept": "application/vnd.github+json"},
              timeout=10
          )
          if r.status_code == 200:
              print(f"{PASS} {varname} valid (repo: {r.json().get('full_name')})")
          else:
              print(f"{WARN} {varname} doesn't grant access to {repo} (HTTP {r.status_code}) — refresh PAT or {purpose} will fail")

      check_gh("GITHUB_TOKEN_AXIOM_OS", "b-tree-labs/axiom-os", "axiom-tests clone")
      check_gh("GITHUB_TOKEN_NEUTRON_MIRROR", "UT-Computational-NE/neutron-os-core", "mirror:github push")

      print("\nPreflight complete (warn-only credential check).")
      EOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

preflight:dependencies:
  stage: preflight
  extends: .python-full-setup
  script:
    - python -c 'import neutron_os; from importlib.metadata import version as v; print("neutron-os " + v("neutron-os") + " — all dependencies resolved")'
    - python -c 'import axiom; from importlib.metadata import version as v; print("axiom " + v("axiom-os-lm") + " — upstream dependency OK")'
    # Verify venv binaries are executable (catches broken symlinks)
    - test -x "$VENV_DIR/bin/python" || (echo "ERROR venv python not executable" && exit 1)
    - test -x "$VENV_DIR/bin/pip" || (echo "ERROR venv pip not executable" && exit 1)
    - test -x "$VENV_DIR/bin/pytest" || (echo "ERROR venv pytest not executable" && exit 1)
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour
  rules:
    # Always run when downstream jobs might need the venv — not just on code changes
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_PIPELINE_SOURCE == "push"
      changes: *changes-code

# =============================================================================
# Test Stage
# =============================================================================

test:unit:
  extends: .python-setup
  stage: test
  needs: [preflight:dependencies]
  script:
    # Use python -m pytest (not bare pytest) because venv shebang paths
    # are not portable across shell runners with different build directories.
    # Skip the AEOS-conformance test_standard.py files when axiom_tests
    # isn't installed (graceful degradation when GITHUB_TOKEN doesn't grant
    # access to b-tree-labs/axiom-os; the standard tests still run on
    # axiom's own CI where axiom-tests is editable).
    - IGNORES=""; if ! python -c "import axiom_tests" 2>/dev/null; then IGNORES="--ignore-glob=**/test_standard.py"; echo "axiom_tests unavailable — deselecting AEOS standard tests"; fi
    - python -m pytest -v --tb=short -m "not integration" $IGNORES
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

lint:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  needs: []
  cache:
    key: ruff
    paths:
      - .ruff-cache/
  script:
    - pip install --quiet --break-system-packages ruff
    - ruff check src/ --select E,F,W --ignore E501 --cache-dir .ruff-cache
  allow_failure: false
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

# =============================================================================
# Build Stage
# =============================================================================

build:wheel:
  extends: .python-setup
  stage: build
  needs: [test:unit, lint, preflight:dependencies]
  script:
    - python -m pip install --quiet build
    - python -m build
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID
      changes: *changes-code

# =============================================================================
# Publish Stage
# =============================================================================

publish:dev:
  extends: .python-setup
  stage: publish
  needs: [build:wheel, preflight:dependencies]
  script:
    - python -m pip install --quiet build twine
    - |
      python3 -c "
      import re, pathlib, os
      iid = os.environ.get('CI_PIPELINE_IID', '0')
      p = pathlib.Path('pyproject.toml')
      text = p.read_text()
      text = re.sub(r'version = \"([^\"]+)\"', lambda m: f'version = \"{m.group(1)}.dev{iid}\"', text, count=1)
      p.write_text(text)
      print(f'Stamped dev version')
      "
    - rm -rf dist/
    - python -m build
    - |
      TWINE_PASSWORD=${CI_JOB_TOKEN} \
      TWINE_USERNAME=gitlab-ci-token \
      python -m twine upload \
        --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi \
        dist/*
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

publish:release:
  extends: .python-setup
  stage: publish
  needs: [build:wheel, preflight:dependencies]
  script:
    - python -m pip install --quiet twine
    - |
      TWINE_PASSWORD=${CI_JOB_TOKEN} \
      TWINE_USERNAME=gitlab-ci-token \
      python -m twine upload \
        --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi \
        dist/*
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# AI Review Stage
# =============================================================================

claude:review:
  stage: ai
  needs: []
  image: node:24-alpine3.21
  before_script:
    - apk update
    - apk add --no-cache git curl bash
    - curl -fsSL https://claude.ai/install.sh | bash
  script:
    - /bin/gitlab-mcp-server || true
    - >
      claude
      -p "${AI_FLOW_INPUT:-'Review this MR for code quality, security issues, and adherence to project conventions defined in CLAUDE.md. Flag any concerns and suggest improvements.'}"
      --permission-mode acceptEdits
      --allowedTools "Bash Read Edit Write mcp__gitlab"
      --max-turns 10
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: '$CI_PIPELINE_SOURCE == "web"'
  timeout: 20 minutes
  allow_failure: true

# =============================================================================
# Mirror Stage — Push stripped copy to public GitHub mirror
# =============================================================================

mirror:github:
  stage: mirror
  image: python:3.12-slim
  needs: [preflight:connections]
  before_script:
    - pip install --quiet --break-system-packages git-filter-repo
    - git config --global user.email "ci@neutron-os"
    - git config --global user.name "Neutron OS CI"
  script:
    - GITHUB_REMOTE_URL="https://x-access-token:${GITHUB_TOKEN_NEUTRON_MIRROR}@github.com/UT-Computational-NE/neutron-os-core.git"
    - git remote add github "$GITHUB_REMOTE_URL" || git remote set-url github "$GITHUB_REMOTE_URL"
    - bash scripts/push-public.sh --push --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *changes-mirror
  allow_failure: true

# =============================================================================
# Notify Stage — Auto-create issue on pipeline failure
# =============================================================================

notify:failure-issue:
  stage: notify
  image: python:3.12-slim
  when: on_failure
  before_script:
    - pip install --quiet --break-system-packages requests
  script:
    - |
      python3 << 'PYEOF'
      import os, requests

      api = "https://rsicc-gitlab.tacc.utexas.edu/api/v4"
      token = os.environ["GITLAB_TOKEN"]
      project_id = os.environ["CI_PROJECT_ID"]
      pipeline_id = os.environ["CI_PIPELINE_ID"]
      pipeline_url = os.environ["CI_PIPELINE_URL"]
      branch = os.environ.get("CI_COMMIT_BRANCH", os.environ.get("CI_MERGE_REQUEST_SOURCE_BRANCH_NAME", "unknown"))
      commit_sha = os.environ["CI_COMMIT_SHORT_SHA"]
      commit_msg = os.environ.get("CI_COMMIT_MESSAGE", "").split("\n")[0][:80]

      headers = {"PRIVATE-TOKEN": token}

      # Check for existing open issue for this pipeline to avoid duplicates
      search = requests.get(
          f"{api}/projects/{project_id}/issues",
          headers=headers,
          params={"state": "opened", "labels": "ci-failure", "per_page": 5, "search": f"Pipeline #{pipeline_id}"},
          timeout=10
      )
      if search.ok and any(f"Pipeline #{pipeline_id}" in i.get("title", "") for i in search.json()):
          print("Issue already exists for this pipeline, skipping.")
      else:
          body = (
              f"## CI Pipeline Failure\n\n"
              f"| Field | Value |\n|---|---|\n"
              f"| **Pipeline** | [#{pipeline_id}]({pipeline_url}) |\n"
              f"| **Branch** | `{branch}` |\n"
              f"| **Commit** | `{commit_sha}` — {commit_msg} |\n\n"
              f"### Action Required\n\n"
              f"Investigate the failed jobs in the pipeline link above and push a fix. "
              f"Close this issue only after the root cause is resolved and the pipeline passes.\n\n"
              f"---\n*Auto-created by CI*"
          )
          resp = requests.post(
              f"{api}/projects/{project_id}/issues",
              headers=headers,
              json={
                  "title": f"🔴 Pipeline #{pipeline_id} failed on `{branch}` ({commit_sha})",
                  "description": body,
                  "labels": "ci-failure,priority::high",
              },
              timeout=10
          )
          if resp.ok:
              print(f"Created issue: {resp.json()['web_url']}")
          else:
              print(f"Failed to create issue: {resp.status_code} {resp.text}")
      PYEOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG
